<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos | Pet Pantry Pro</title>

    <link rel="stylesheet" href="../../src/css/base/reset.css">
    <link rel="stylesheet" href="../../src/css/base/variables.css">
    <link rel="stylesheet" href="../../src/css/base/typography.css">
    <link rel="stylesheet" href="../../src/css/layouts/app-layout.css">
    <link rel="stylesheet" href="../../src/css/layouts/sidebar.css">
    <link rel="stylesheet" href="../../src/css/layouts/topbar.css">

    <link rel="stylesheet" href="../../src/css/components/cards.css">
    <link rel="stylesheet" href="../../src/css/components/forms.css">
    <link rel="stylesheet" href="../../src/css/components/buttons.css">
    <link rel="stylesheet" href="../../src/css/components/badges.css">
    <link rel="stylesheet" href="../../src/css/components/file-upload.css">
    <link rel="stylesheet" href="../../src/css/components/tables.css">

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos para el modal de edición */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <div class="app-wrapper">

        <aside class="app-sidebar" id="sidebar">
            <div class="sidebar-header">
                <i data-lucide="paw-print" class="sidebar-brand"></i>
                <span class="sidebar-brand">PetPantry Pro</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item"><a href="panel-admin.html" class="nav-link"><i data-lucide="layout-dashboard"></i>
                        Resumen</a></div>
                <div class="nav-item"><a href="adopciones.html" class="nav-link"><i data-lucide="bone"></i>
                        Adopciones</a></div>
                <div class="nav-item"><a href="productos.html" class="nav-link active"><i data-lucide="shopping-bag"></i>
                        Productos</a></div>
                <div class="nav-item"><a href="personal.html" class="nav-link"><i data-lucide="users"></i> Personal</a>
                </div>
                <div class="nav-item"><a href="reportes.html" class="nav-link"><i data-lucide="bar-chart-3"></i> Reportes</a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <a href="../auth/login.html" class="nav-link text-danger"><i data-lucide="log-out"></i> Cerrar
                    Sesión</a>
            </div>
        </aside>

        <header class="app-topbar">
            <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú"><i data-lucide="menu"></i></button>
            <div class="user-profile">
                <div class="user-info">
                    <span class="user-name">Dr. Carlos Vise</span>
                    <span class="user-role">Administrador</span>
                </div>
                <div class="user-avatar">CV</div>
            </div>
        </header>

        <main class="app-main">
            <div class="content-area">

                <header style="margin-bottom: var(--space-8);">
                    <h1>Gestión de Productos</h1>
                    <p class="text-muted">Crea, edita y elimina los productos que se muestran en la tienda del
                        catálogo público y del panel de cliente.</p>
                </header>

                <div class="card" style="margin-bottom: var(--space-8);">
                    <div class="card-header">
                        <h3 class="card-title"
                            style="display:flex; align-items:center; gap:8px; color: var(--color-primary-600);">
                            <i data-lucide="package-plus"></i> Nuevo Producto
                        </h3>
                    </div>
                    <div class="card-body">
                        <form id="form-producto" enctype="multipart/form-data">
                            <div
                                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: var(--space-4);">
                                <div class="form-group"><label class="form-label">Nombre del producto</label><input
                                        type="text" id="producto-nombre" class="form-control" required
                                        placeholder="Ej. Royal Canin Mini Adult"></div>
                                <div class="form-group"><label class="form-label">Categoría</label>
                                    <select id="producto-categoria" class="form-control" required>
                                        <option value="" disabled selected>Seleccione...</option>
                                        <option value="alimentos">Alimentos</option>
                                        <option value="accesorios">Accesorios</option>
                                        <option value="farmacia">Farmacia</option>
                                    </select>
                                </div>
                                <div class="form-group"><label class="form-label">Precio (S/)</label><input
                                        type="number" id="producto-precio" class="form-control" min="0" step="0.01"
                                        required placeholder="Ej. 120.00"></div>
                            </div>

                            <div class="form-group" style="margin-top: var(--space-4);">
                                <label class="form-label">Descripción</label>
                                <textarea id="producto-descripcion" class="form-control" rows="2" required
                                    placeholder="Ej. Alimento Seco Premium • 3kg. Nutrición balanceada."></textarea>
                            </div>

                            <div class="file-upload-wrapper" style="margin-top: var(--space-4);">
                                <div class="form-group">
                                    <label class="form-label">Imagen del producto (PNG/JPG)</label>
                                    <input type="file" id="producto-imagen" class="form-control" accept="image/*"
                                        required style="padding: 8px;">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary" style="margin-top: var(--space-4);"><i
                                    data-lucide="upload"></i> Publicar en la Tienda</button>
                        </form>
                    </div>
                </div>

                <h3 style="margin-bottom: var(--space-4);">Productos Publicados</h3>

                <div id="grid-productos"
                    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: var(--space-6);">
                </div>

            </div>
        </main>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
    </div>

    <!-- MODAL DE EDICIÓN DE PRODUCTO -->
    <div class="modal-overlay" id="modalEditarProducto">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin:0;">Editar Producto</h3>
                <button onclick="cerrarModalProducto()" style="background:none; border:none; cursor:pointer;"><i
                        data-lucide="x"></i></button>
            </div>

            <form id="form-editar-producto" enctype="multipart/form-data">
                <input type="hidden" id="edit-producto-id">

                <div class="form-group" style="margin-bottom: 16px;">
                    <label class="form-label">Nombre</label>
                    <input type="text" id="edit-producto-nombre" class="form-control" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                    <div class="form-group"><label class="form-label">Categoría</label>
                        <select id="edit-producto-categoria" class="form-control" required>
                            <option value="alimentos">Alimentos</option>
                            <option value="accesorios">Accesorios</option>
                            <option value="farmacia">Farmacia</option>
                        </select>
                    </div>
                    <div class="form-group"><label class="form-label">Precio (S/)</label><input type="number"
                            id="edit-producto-precio" class="form-control" min="0" step="0.01" required></div>
                </div>

                <div class="form-group" style="margin-bottom: 16px;">
                    <label class="form-label">Descripción</label>
                    <textarea id="edit-producto-descripcion" class="form-control" rows="2" required></textarea>
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <label class="form-label">Actualizar Imagen (Opcional)</label>
                    <input type="file" id="edit-producto-imagen" class="form-control" accept="image/*"
                        style="padding: 8px;">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <script src="../../src/js/utils/toast.js"></script>
    <script type="module" src="../../src/js/layouts/main-layout.js"></script>
    <script type="module" src="../../src/js/pages/admin-productos.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
